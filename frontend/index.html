<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confidential Payroll</title>
  <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
  <script src="./relayer-sdk.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 700px; margin: 40px auto; padding: 0 16px; }
    h1 { font-size: 1.4rem; }
    button { padding: 10px 16px; font-size: 1rem; cursor: pointer; border-radius: 8px; border: 1px solid #ccc; }
    pre { background: #f4f4f5; padding: 14px; border-radius: 8px; white-space: pre-wrap; word-break: break-all; margin-top: 16px; }
  </style>
</head>
<body>
  <h1>🔒 Confidential Payroll</h1>
  <button id="connect">Connect wallet</button>
  <div id="panel" style="display:none; margin-top:20px;">
    <h2 style="font-size:1.1rem;">Pay salary</h2>
    <input id="employee" placeholder="Employee address (0x...)" style="width:100%; padding:8px; margin-bottom:8px;" />
    <input id="amount" type="number" placeholder="Amount" style="width:100%; padding:8px; margin-bottom:8px;" />
    <button id="pay">Encrypt & pay</button>
    <h2 style="font-size:1.1rem; margin-top:24px;">Check my salary</h2>
    <button id="decrypt">Decrypt my balance</button>
  </div>
  <pre id="log">Logs will appear here…</pre>
  <script src="app.js"></script>
</body>
</html>
