<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confidential Payroll</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>
  <script src="./relayer-sdk.js"></script>
  <style>
    :root {
      --bg: #09090b; --surface: #131316; --surface-2: #1c1c20;
      --border: #27272a; --text: #fafafa; --muted: #a1a1aa;
      --accent: #00e5a0; --accent-dim: rgba(0,229,160,0.12); --danger: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 580px; margin: 0 auto; padding: 48px 20px 80px; line-height: 1.5;
    }
    .mono { font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace; }
    header { margin-bottom: 28px; }
    h1 { font-size: 1.6rem; font-weight: 700; margin: 0 0 6px; letter-spacing: -0.02em; }
    .tagline { color: var(--muted); font-size: 0.95rem; margin: 0; }
    h2 { font-size: 1.05rem; font-weight: 600; margin: 0 0 4px; }
    .card-sub { color: var(--muted); font-size: 0.85rem; margin: 0 0 16px; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; padding: 22px; margin-bottom: 16px;
    }
    button {
      font-family: inherit; font-weight: 600; font-size: 0.95rem;
      padding: 12px 18px; border-radius: 10px; cursor: pointer;
      border: none; transition: transform .05s ease, opacity .15s ease;
    }
    button:active { transform: translateY(1px); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #04110c; }
    .btn-primary:hover:not(:disabled) { opacity: 0.9; }
    .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover:not(:disabled) { border-color: var(--accent); }
    .full { width: 100%; }
    input {
      width: 100%; padding: 12px 14px; margin-bottom: 12px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 0.95rem; font-family: inherit;
    }
    input::placeholder { color: var(--muted); }
    input:focus { outline: none; border-color: var(--accent); }
    #status { display: none; align-items: center; gap: 8px; flex-wrap: wrap;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 999px; padding: 8px 14px; font-size: 0.82rem; margin-bottom: 24px; width: fit-content; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    .badge { background: var(--accent-dim); color: var(--accent); font-weight: 600;
      padding: 2px 10px; border-radius: 999px; font-size: 0.75rem; }
    #balance { font-size: 2rem; font-weight: 700; letter-spacing: -0.02em; margin: 4px 0 0;
      color: var(--muted); }
    #balance.revealed { color: var(--accent); }
    pre {
      background: #050506; border: 1px solid var(--border); color: var(--muted);
      padding: 14px; border-radius: 12px; white-space: pre-wrap; word-break: break-all;
      margin-top: 24px; font-family: 'JetBrains Mono', ui-monospace, monospace;
      font-size: 0.78rem; max-height: 260px; overflow-y: auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>🔒 Confidential Payroll</h1>
    <p class="tagline">Salaries nobody can see. Payments everyone can trust.</p>
  </header>

  <button id="connect" class="btn-primary">Connect wallet</button>

  <div id="status">
    <span class="dot"></span>
    <span id="walletAddr" class="mono"></span>
    <span class="badge" id="walletRole">—</span>
  </div>

  <div id="employerPanel" class="card" style="display:none;">
    <h2>Run payroll</h2>
    <p class="card-sub">Pay an employee. The amount is encrypted in your browser first.</p>
    <input id="employee" placeholder="Employee address (0x…)" />
    <input id="amount" type="number" placeholder="Amount" />
    <button id="pay" class="btn-primary full">Encrypt &amp; pay</button>
    <p id="payResult" style="display:none; margin:14px 0 0; font-weight:600; color:var(--accent);"></p>
  </div>

  <div id="employeePanel" class="card" style="display:none;">
    <h2>My salary</h2>
    <p class="card-sub">Decrypt your encrypted balance — visible only to you.</p>
    <p id="balance">🔒 Encrypted</p>
    <button id="decrypt" class="btn-secondary full" style="margin-top:16px;">Decrypt my balance</button>
  </div>

  <pre id="log">Logs will appear here…</pre>
  <script src="app.js"></script>
</body>
</html>
